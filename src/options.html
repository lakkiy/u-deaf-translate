<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <title>叫你翻译你聋吗 - 设置</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #1a1a1a;
      --muted: #666;
      --border: rgba(0, 0, 0, 0.15);
      --field-bg: #fafafa;
      --accent: #c0392b;
      --success: #27ae60;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1f1f1f;
        --fg: #f5f5f5;
        --muted: #aaa;
        --border: rgba(255, 255, 255, 0.15);
        --field-bg: #2a2a2a;
        --accent: #ff8080;
        --success: #2ecc71;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 32px 24px;
      background: var(--bg);
      color: var(--fg);
      font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    main { max-width: 680px; margin: 0 auto; }
    h1 { margin: 0 0 24px; font-size: 22px; }

    /* Tab 栏 */
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab:hover { color: var(--fg); }
    .tab.active {
      color: var(--fg);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }
    .tab svg {
      width: 20px;
      height: 20px;
      display: block;
      border-radius: 50%;
    }

    /* Panel */
    .panel { display: none; }
    .panel.active { display: block; }

    /* 字段 */
    label {
      display: block;
      margin: 18px 0 6px;
      font-weight: 600;
    }
    .field-hint {
      font-weight: normal;
      color: var(--muted);
      font-size: 12px;
      margin-left: 6px;
    }
    input, textarea, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--field-bg);
      color: var(--fg);
      font: inherit;
    }
    select { appearance: auto; }
    textarea {
      min-height: 140px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
    }
    input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }

    .static-info {
      background: var(--field-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      margin: 12px 0;
      font-size: 13px;
      color: var(--muted);
    }
    .static-info code {
      color: var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }
    .static-info p { margin: 4px 0; }

    /* 底部操作 */
    .row { margin-top: 28px; display: flex; align-items: center; gap: 12px; }
    button.action {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button.action.secondary {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      font-weight: normal;
    }
    button.action:hover { filter: brightness(1.05); }
    #status { color: var(--success); font-size: 13px; min-height: 1em; }
    #status.error { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>叫你翻译你聋吗 · 设置</h1>

    <div class="tabs" role="tablist">
      <button class="tab" data-tab="chrome" role="tab">Chrome 内置</button>
      <button class="tab" data-tab="deepseek" role="tab">
        <span id="deepseek-icon"></span>
        <span>DeepSeek</span>
      </button>
      <button class="tab" data-tab="custom" role="tab">自定义</button>
    </div>

    <!-- Chrome panel：无字段，纯说明 -->
    <section class="panel" data-panel="chrome">
      <div class="static-info">
        <p>使用 Chrome 138+ 内置 Translator API，模型本地推理，零联网。</p>
        <p>首次使用某语言对会下载模型（几十 MB），之后离线可用。</p>
        <p>无需配置——选中这个 tab 后点保存即可。</p>
      </div>
    </section>

    <!-- DeepSeek panel：填 API Key + 选 model；其他信息固定展示 -->
    <section class="panel" data-panel="deepseek">
      <div class="static-info">
        <p>Endpoint：<code>https://api.deepseek.com/chat/completions</code></p>
        <p>生成参数：<code>{"temperature": 1.3, "max_tokens": 1024, "thinking": {"type": "disabled"}}</code></p>
        <p>已关闭思考模式——翻译任务无需推理，关掉响应更快。</p>
      </div>

      <label>
        Model
        <span class="field-hint">默认 flash，质量优先时选 pro</span>
      </label>
      <select id="deepseekModel"></select>

      <label>
        API Key
        <span class="field-hint">在 platform.deepseek.com 注册并创建</span>
      </label>
      <input id="deepseekApiKey" type="password" placeholder="sk-..." />
    </section>

    <!-- 自定义 panel：完整字段 -->
    <section class="panel" data-panel="custom">
      <label>
        Endpoint
        <span class="field-hint">完整 chat completions URL</span>
      </label>
      <input id="custom-endpoint" type="url" placeholder="http://localhost:8000/v1/chat/completions" />

      <label>
        API Key
        <span class="field-hint">可选；本地部署一般不需要</span>
      </label>
      <input id="custom-apiKey" type="password" placeholder="留空表示不发 Authorization 头" />

      <label>
        Model
        <span class="field-hint">必须跟服务端启动时一致；留空则不发该字段</span>
      </label>
      <input id="custom-model" type="text" placeholder="mlx-community/Hy-MT2-1.8B-4bit" />

      <label>
        Prompt 模板
        <span class="field-hint">占位符 <code>{target_lang}</code> / <code>{source_text}</code></span>
      </label>
      <textarea id="custom-promptTemplate"></textarea>

      <label>
        额外参数（JSON）
        <span class="field-hint">合法 JSON 对象，merge 进请求 body；空则不附加</span>
      </label>
      <textarea id="custom-extraParams" style="min-height: 80px;"></textarea>

      <div style="margin-top: 14px;">
        <button class="action secondary" id="reset-custom" type="button">恢复默认 Prompt &amp; 参数</button>
      </div>
    </section>

    <div class="row">
      <button class="action" id="save">保存（设为当前后端）</button>
      <span id="status"></span>
    </div>
  </main>
  <script type="module" src="./options.ts"></script>
</body>
</html>
